<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnyBot - 远程控制</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 连接面板 -->
    <div id="connect-overlay">
        <h1>AnyBot</h1>
        <p>远程控制你的 Mac</p>
        <button id="connect-btn" onclick="startConnection()">连接</button>
        <div id="connect-info"></div>
    </div>

    <!-- 状态栏 -->
    <div id="status-bar">
        <div class="status-left">
            <div id="status-dot"></div>
            <span id="status-text">未连接</span>
            <!-- 上传进度（嵌入状态栏） -->
            <div id="upload-status" class="upload-status" style="display:none">
                <span id="upload-status-icon"></span>
                <span id="upload-status-text"></span>
                <div id="upload-status-bar"><div id="upload-status-fill"></div></div>
            </div>
        </div>
        <div class="status-right">
            <span id="bw-text"></span>
            <span id="fps-text"></span>
            <button class="tool-btn" onclick="toggleFullscreenLandscape()" id="btn-fullscreen" style="height:26px;padding:0 10px;font-size:11px;">🔲 全屏</button>
        </div>
    </div>

    <!-- 光标指示器 -->
    <div id="cursor-indicator"></div>

    <!-- 拖拽状态 -->
    <div id="drag-indicator">拖拽中...</div>

    <!-- 模式指示器 -->
    <div id="mode-indicator" class="browse">浏览模式</div>

    <!-- 屏幕画面 -->
    <div id="screen-container">
        <canvas id="screen-canvas"></canvas>
    </div>

    <!-- 工具栏 -->
    <div id="toolbar">
        <button class="tool-btn" onclick="toggleMode()" id="btn-mode" style="background:#30d158;border-color:#30d158">👁 浏览</button>
        <button class="tool-btn" onclick="toggleKeyboard()" id="btn-keyboard">⌨️ 键盘</button>
        <button class="tool-btn" onclick="toggleScrollMode()" id="btn-scroll">🖱 滚轮</button>
        <button class="tool-btn" onclick="showWindowPicker()" id="btn-window">🪟 窗口</button>
        <button class="tool-btn" onclick="toggleMoreMenu()" id="btn-more">⋯ 更多</button>
    </div>

    <!-- 更多菜单 -->
    <div id="more-menu">
        <button class="more-menu-item" onclick="sendKey(['command','c']);hideMoreMenu()"><span class="mi-icon">📋</span><span class="mi-label">复制</span></button>
        <button class="more-menu-item" onclick="sendKey(['command','v']);hideMoreMenu()"><span class="mi-icon">📌</span><span class="mi-label">粘贴</span></button>
        <button class="more-menu-item" onclick="sendKey(['command','z']);hideMoreMenu()"><span class="mi-icon">↩️</span><span class="mi-label">撤销</span></button>
        <button class="more-menu-item" onclick="sendKey(['command','shift','z']);hideMoreMenu()"><span class="mi-icon">↪️</span><span class="mi-label">重做</span></button>
        <button class="more-menu-item" onclick="goHome();hideMoreMenu()"><span class="mi-icon">🏠</span><span class="mi-label">Spotlight</span></button>
        <button class="more-menu-item" onclick="resetZoom();hideMoreMenu()"><span class="mi-icon">🔍</span><span class="mi-label">重置缩放</span></button>
        <button class="more-menu-item" onclick="wakeScreen();hideMoreMenu()"><span class="mi-icon">☀️</span><span class="mi-label">唤醒屏幕</span></button>
        <button class="more-menu-item" onclick="adjustBrightness('up')"><span class="mi-icon">🔆</span><span class="mi-label">亮度+</span></button>
        <button class="more-menu-item" onclick="adjustBrightness('down')"><span class="mi-icon">🔅</span><span class="mi-label">亮度−</span></button>
        <button class="more-menu-item" id="btn-upload"><span class="mi-icon">📁</span><span class="mi-label">上传文件</span></button>
    </div>

    <!-- 窗口选择弹窗 -->
    <div id="window-picker-overlay">
        <div id="window-picker">
            <div id="window-picker-header">
                <h3>选择要捕获的窗口</h3>
                <button id="window-picker-close" onclick="hideWindowPicker()">✕</button>
            </div>
            <div id="window-picker-current"></div>
            <button id="window-fullscreen-btn" onclick="selectWindow(null)">🖥 全屏模式</button>
            <div id="window-list-loading">加载中...</div>
            <div id="window-list"></div>
        </div>
    </div>

    <!-- 虚拟键盘 -->
    <div id="keyboard-panel">
        <input type="text" id="text-input" placeholder="输入即发送..." 
               autocomplete="off" autocorrect="off" autocapitalize="off">
        <div class="key-row">
            <button class="key-btn wide" onclick="sendKey(['escape'])">Esc</button>
            <button class="key-btn wide" onclick="sendKey(['tab'])">Tab</button>
            <button class="key-btn wide" onclick="sendKey(['backspace'])">⌫</button>
            <button class="key-btn wide" onclick="sendKey(['delete'])">Del</button>
            <button class="key-btn wide" onclick="sendKey(['enter'])">Enter</button>
        </div>
        <div class="key-row">
            <button class="key-btn wide" onclick="sendKey(['ctrl','space'])">切换输入法</button>
            <button class="key-btn wide" onclick="sendKey(['command','c'])">⌘C</button>
            <button class="key-btn wide" onclick="sendKey(['command','v'])">⌘V</button>
            <button class="key-btn wide" onclick="sendKey(['command','x'])">⌘X</button>
            <button class="key-btn wide" onclick="sendKey(['command','s'])">⌘S</button>
            <button class="key-btn wide" onclick="sendKey(['ctrl','c'])">^C</button>
        </div>
        <div class="key-row">
            <button class="key-btn" onclick="sendKey(['up'])">↑</button>
            <button class="key-btn" onclick="sendKey(['down'])">↓</button>
            <button class="key-btn" onclick="sendKey(['left'])">←</button>
            <button class="key-btn" onclick="sendKey(['right'])">→</button>
            <button class="key-btn wide" onclick="sendKey(['space'])">Space</button>
        </div>
    </div>

    <!-- 文件上传（隐藏 input） -->
    <input type="file" id="upload-input" multiple
           style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0;">

    <!-- JS 模块：加载顺序有依赖关系 -->
    <script src="/static/js/app.js"></script>     <!-- 核心状态 & 连接 -->
    <script src="/static/js/ui.js"></script>      <!-- UI 控制 -->
    <script src="/static/js/touch.js"></script>   <!-- 触摸手势 -->
</body>
</html>
